<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哈基米相似度测试</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-labelledby="page-title">
        <div class="intro">
          <img class="mascot" src="./assets/hachimi-cat.svg" alt="哈基米猫咪" />
          <div>
            <p class="eyebrow">Hachimi Voice Check</p>
            <h1 id="page-title">测测你的哈基米浓度</h1>
            <p class="lead">录一段声音，或者上传音频，看看它离“哈基米宇宙”还有多远。</p>
          </div>
        </div>

        <div class="workspace">
          <section class="panel recorder" aria-labelledby="record-title">
            <div class="panel-head">
              <div>
                <p class="step">01</p>
                <h2 id="record-title">录音或上传</h2>
              </div>
              <span class="status" id="statusText">准备就绪</span>
            </div>

            <div class="meter" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>

            <p class="timer" id="timerText">00:00</p>

            <div class="actions">
              <button class="primary" id="recordButton" type="button">开始录音</button>
              <button class="secondary" id="resetButton" type="button" disabled>重新开始</button>
            </div>

            <label class="upload">
              <span>上传音频文件</span>
              <input id="fileInput" type="file" accept="audio/*" />
            </label>

            <audio id="audioPreview" controls hidden></audio>
          </section>

          <section class="panel result" aria-labelledby="result-title">
            <div class="panel-head">
              <div>
                <p class="step">02</p>
                <h2 id="result-title">检测结果</h2>
              </div>
              <span class="mode" id="modeText">Mock 模式</span>
            </div>

            <div class="score-wrap">
              <svg class="score-ring" viewBox="0 0 120 120" role="img" aria-label="相似度分数">
                <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
                <circle class="ring-value" id="scoreRing" cx="60" cy="60" r="52"></circle>
              </svg>
              <div class="score-copy">
                <p id="scoreText">--</p>
                <span>相似度</span>
              </div>
            </div>

            <h3 id="gradeText">等待一声哈基米</h3>
            <p class="comment" id="commentText">录音完成后点击检测，结果会在这里冒出来。</p>

            <button class="primary full" id="checkButton" type="button" disabled>检测哈基米浓度</button>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
